<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Músicos Favoritos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #1db954; border-radius: 5px; }
        body { background-color: #121212; color: #ffffff; font-family: 'Montserrat', sans-serif; margin: 0; }
        nav { background: #1db954; padding: 20px; text-align: center; font-weight: bold; }
        h1 { font-family: 'Playfair Display', serif; text-align: center; margin: 40px 0; color: #1db954; }
        .music-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; padding: 40px; }
        .artist-card { background: #181818; border-radius: 12px; overflow: hidden; transition: 0.3s; border: 1px solid #282828; }
        .artist-card:hover { background: #282828; transform: translateY(-5px); }
        .artist-card img { width: 100%; height: 350px; object-fit: cover; }
        .artist-info { padding: 25px; }
        .artist-info h2 { margin: 0 0 10px; color: #1db954; }
        @media (max-width: 600px) { .music-grid { padding: 15px; gap: 15px; } .artist-card img { height: 250px; } }
    </style>
</head>
<body>
    <nav>MUSIC VIBES</nav>
    <h1>ARTISTAS DESTACADOS</h1>
    <div class="music-grid" id="main-content"></div>
</body>
</html>
