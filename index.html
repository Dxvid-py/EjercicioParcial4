<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Músicos Favoritos</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #1db954; border-radius: 5px; }
        body { background-color: #121212; color: #ffffff; font-family: 'Montserrat', sans-serif; margin: 0; }
        nav { background: #1db954; padding: 20px; text-align: center; font-weight: bold; }
        h1 { font-family: 'Playfair Display', serif; text-align: center; margin: 40px 0; color: #1db954; }
        .music-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; padding: 40px; }
        .artist-card { background: #181818; border-radius: 12px; overflow: hidden; transition: 0.3s; border: 1px solid #282828; }
        .artist-card:hover { background: #282828; transform: translateY(-5px); }
        .artist-card img { width: 100%; height: 350px; object-fit: cover; }
        .artist-info { padding: 25px; }
        .artist-info h2 { margin: 0 0 10px; color: #1db954; }
        .artist-info .album { color: #b3b3b3; font-style: italic; margin-bottom: 15px; display: block; font-size: 0.9rem; }
    </style>
</head>
<body>
    <nav>MUSIC VIBES</nav>
    <h1>ARTISTAS DESTACADOS</h1>
    <div class="music-grid">
        <div class="artist-card"><img src="https://www.billboard.com/wp-content/uploads/2023/10/bad-bunny-press-2023-cr-Eric-Rojas-billboard-1548.jpg"><h3>Bad Bunny</h3></div>
        <div class="artist-card"><img src="https://hips.hearstapps.com/hmg-prod/images/karol-g-gettyimages-1483864197-64478f772e27b.jpg"><h3>Karol G</h3></div>
        <div class="artist-card"><img src="https://img.vixdata.io/wm/6146059e9c8f8b001275d862"><h3>Feid</h3></div>
        <div class="artist-card">
            <img src="https://media.vogue.es/photos/64105267a57a898402c449f1/1:1/w_2000,h_2000,c_limit/GettyImages-1461474921.jpg" alt="Shakira">
            <div class="artist-info">
                <h2>Shakira</h2>
                <span class="album">Álbum: Pies Descalzos</span>
                <p>La artista latina más influyente de la historia, reconocida mundialmente por su versatilidad y voz.</p>
            </div>
        </div>
    </div>
</body>
</html>
